version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /tests
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      jupyter:
        patterns:
          - "jupyter*"
          - "ipython*"
          - "ipywidgets"
          - "notebook"
          - "nbformat"
          - "nbconvert"
      scientific:
        patterns:
          - "numpy"
          - "scipy"
          - "matplotlib"
          - "seaborn"
          - "pandas"
          - "sympy"
          - "scikit-learn"
          - "statsmodels"
      ml:
        patterns:
          - "torch*"
          - "tensorflow*"
          - "keras*"

  - package-ecosystem: pip
    directory: /utils
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
